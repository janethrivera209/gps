services:
  - type: web
    name: gps-automatas
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r gps/requirements.txt
    startCommand: gunicorn --workers 2 --worker-class sync --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
